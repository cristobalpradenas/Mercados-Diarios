<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Diario de Mercados</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#484540;color:#f0ead8;display:flex;height:100vh;overflow:hidden}
.sb{width:200px;flex-shrink:0;background:#f5f0e8;border-right:2px solid #1a1a1a;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.sb-head{padding:1rem;border-bottom:2px solid #1a1a1a}
.sb-name{font-family:Georgia,serif;font-size:15px;font-weight:700;color:#1a1a1a;line-height:1.2}
.sb-sub{font-size:10px;color:#8a7a6a;margin-top:3px;text-transform:uppercase;letter-spacing:0.12em}
.cal-wrap{padding:0.75rem;flex:1;overflow-y:auto}
.cal-m-title{font-size:10px;font-weight:700;color:#5a4a3a;text-transform:uppercase;letter-spacing:0.12em;margin:0 0 6px}
.cal-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px}
.cal-hdr span{text-align:center;font-size:9px;color:#9a8a7a}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:10px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:4px}
.cal-btn{background:none;border:1px solid #d4c8b0;border-radius:3px;color:#5a4a3a;font-size:18px;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;user-select:none;flex-shrink:0}
.cal-btn:hover{background:#e0d8c8}
.cal-label{display:flex;align-items:center;gap:3px;flex:1;justify-content:center}
.cal-lbl-btn{background:none;border:none;cursor:pointer;font-size:11px;font-weight:700;color:#1a1a1a;padding:2px 5px;border-radius:3px;user-select:none}
.cal-lbl-btn:hover{background:#e0d8c8;color:#e07b39}
.cal-dropdown{position:absolute;background:#fff;border:1px solid #d4c8b0;border-radius:4px;box-shadow:0 4px 16px rgba(0,0,0,0.15);z-index:999;min-width:120px;max-height:200px;overflow-y:auto}
.cal-dropdown-item{padding:6px 12px;font-size:11px;cursor:pointer;color:#1a1a1a}
.cal-dropdown-item:hover{background:#f0e8d8;color:#e07b39}
.cal-dropdown-item.active{font-weight:700;color:#e07b39}
.day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:11px;border-radius:3px;color:#8a7a6a;transition:all 0.15s}
.day.has{background:#e07b39;color:#fff;font-weight:700;cursor:pointer}
.day.has:hover{background:#c0612a}
.day.active{background:#1a1a1a!important;color:#fff!important;font-weight:700}
.leg{border-top:1px solid #d4c8b0;padding:8px 0.75rem 0.75rem;display:flex;flex-direction:column;gap:4px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:#8a7a6a}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.top-bar{padding:0.75rem 1.5rem;border-bottom:1px solid #5a5550;background:#3a3735}
.top-date{font-family:Georgia,serif;font-size:17px;font-weight:700;color:#f0ead8}
.top-sub{font-size:11px;color:#a09080;margin-top:2px}
.tabs{display:flex;border-bottom:1px solid #5a5550;background:#484540;padding:0 1.5rem}
.tab{padding:0.5rem 0;margin-right:1.25rem;font-size:11px;font-weight:700;color:#c0a888;border-bottom:2px solid transparent;text-transform:uppercase;letter-spacing:0.08em;cursor:pointer;transition:all 0.15s}
.tab.active{color:#ffffff;border-bottom-color:#e07b39}
.cnt{flex:1;overflow-y:auto;padding:1.25rem 1.5rem}
.view{display:none}.view.active{display:block}
.sec{display:flex;align-items:center;gap:8px;margin:1.25rem 0 8px}
.sec:first-child{margin-top:0}
.sec-bar{width:3px;height:14px;background:#e07b39;border-radius:1px;flex-shrink:0}
.sec-title{font-family:Georgia,serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:#f0ead8;white-space:nowrap}
.sec-line{flex:1;height:1px;background:#5a5550}
.cg{display:grid;gap:6px}.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
.pc{background:#3a3735;border:1px solid #5a5550;border-radius:4px;padding:10px 12px}
.pc-lbl{font-size:11px;font-weight:600;color:#c0a888;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px}
.pc-val{font-family:Georgia,serif;font-size:16px;font-weight:700;color:#f0ead8;margin-bottom:2px;line-height:1}
.pc-chg{font-size:12px;font-weight:600;line-height:1}
.up{color:#4ade80}.dn{color:#f87171}.neu{color:#a09080}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.hl{background:#3a3735;border:1px solid #5a5550;border-left:4px solid #c0392b;border-radius:0 4px 4px 0;padding:12px 14px;margin-bottom:6px}
.hl.media{border-left-color:#e07b39}.hl.baja{border-left-color:#5a5550}
.hl-tags{display:flex;gap:5px;margin-bottom:6px;align-items:center;flex-wrap:wrap}
.ti{font-size:9px;font-weight:700;padding:2px 6px;border-radius:2px;text-transform:uppercase;letter-spacing:0.08em}
.ti.alta{background:#c0392b;color:#fff}.ti.media{background:#e07b39;color:#fff}.ti.baja{background:#5a5550;color:#c0a888}
.tr{font-size:11px;color:#d0b898;background:#4a4540;padding:2px 7px;border-radius:2px}
.ts{font-size:11px;color:#a09080;margin-left:auto;font-style:italic}
.hl-title{font-family:Georgia,serif;font-size:14px;font-weight:700;color:#f0ead8;line-height:1.4;margin-bottom:4px}
.hl-body{font-size:14px;color:#c8b8a8;line-height:1.65}
.hl-asset{margin-top:8px;display:inline-flex;gap:10px;background:#2e2b28;padding:5px 10px;border-radius:3px;align-items:center}
.hl-an{font-size:11px;color:#a09080;text-transform:uppercase}
.hl-av{font-family:Georgia,serif;font-size:14px;font-weight:700;color:#f0ead8}
.hl-ac{font-size:12px;font-weight:600}
.earn{background:#3a3735;border:1px solid #5a5550;border-radius:4px;padding:12px 14px;margin-bottom:6px}
.earn-head{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.en{font-family:Georgia,serif;font-size:14px;font-weight:700;color:#f0ead8}
.et2{font-size:11px;color:#a09080;background:#4a4540;padding:2px 6px;border-radius:2px}
.ew{font-size:9px;font-weight:700;padding:2px 6px;border-radius:2px;background:#e07b39;color:#fff;text-transform:uppercase}
.ep{margin-left:auto;font-size:13px;font-weight:700}
.eg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.eg label{font-size:11px;color:#c0a888;display:block;margin-bottom:3px}
.eg p{font-size:13px;font-weight:600;color:#f0ead8;margin:0}
.narr{display:flex;flex-direction:column;gap:6px}
.ni{display:flex;gap:10px;background:#3a3735;border:1px solid #5a5550;border-radius:4px;padding:10px 14px;align-items:flex-start}
.nd{color:#e07b39;font-size:14px;flex-shrink:0;margin-top:2px}.nd-ap{color:#60a5fa;font-size:13px;flex-shrink:0;margin-top:3px;font-weight:700}
.nt{font-size:14px;color:#d8c8b8;line-height:1.7}
pre{white-space:pre-wrap;font-family:'Courier New',monospace;font-size:12px;line-height:1.7;color:#c8b8a8;background:#3a3735;padding:1.25rem;border-radius:4px;border:1px solid #5a5550}
.empty-st{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;text-align:center}
.empty-st h2{font-family:Georgia,serif;font-size:1.1rem;color:#a09080;margin-bottom:6px}
.empty-st p{font-size:12px;color:#706050}
@media(max-width:640px){
body{flex-direction:column;height:100vh;overflow:hidden}
.sb{width:100%;height:auto;flex-direction:column;border-right:none;border-bottom:1px solid #d4c8b0;flex-shrink:0}
.sb-head{display:flex;align-items:center;justify-content:space-between;padding:0.6rem 1rem;border-bottom:none}
.sb-name{font-size:13px}
.sb-sub{display:none}
.mob-cal-btn{display:flex!important}
.cal-wrap{display:none;padding:0.6rem 1rem 0.75rem}
.cal-wrap.open{display:block}
.leg{display:none}
.main{flex:1;overflow:hidden}
.top-bar{padding:0.5rem 1rem}
.top-date{font-size:14px}
.top-sub{font-size:10px}
.tabs{padding:0 1rem}
.tab{font-size:10px;margin-right:1rem}
.cnt{padding:0.75rem 1rem}
.g4{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(2,1fr)}
.two-col{grid-template-columns:1fr}
.eg{grid-template-columns:repeat(2,1fr)}
.hl-title{font-size:13px}
.hl-body{font-size:12px}
.nt{font-size:12px}
}
@media(min-width:641px){.mob-cal-btn{display:none!important}}</style>
</head>

</div>

te a TSMC.\n   \u2192 Intel (INTC): $110.27  (+11.19%)  [Yahoo Finance]  Peso SPY: 0.73%  Peso QQQ: 1.12%\n   \u2192 Alphabet (GOOGL): $363.31  (-1.36%)  [Yahoo Finance]  Peso SPY: 3.40%  Peso QQQ: 2.98%\n   \u2192 TSMC (TSM): $426.80  (+2.80%)  [Yahoo Finance]  Peso QQQ: 0.85%\n\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\ud83d\udd34 [ALTA] Nvidia eval\u00faa nodo 18A de Intel para futuro dise\u00f1o de procesador multi-chip\n   EE.UU. \u00b7 tecnolog\u00eda / semiconductores \u00b7 theinformation.com\n\n   Seg\u00fan The Information, Nvidia est\u00e1 probando en serio el nodo de proceso avanzado 18A de Intel para un futuro dise\u00f1o de procesador multi-chip, aunque a\u00fan no ha colocado una orden formal.\n   \u2192 Intel (INTC): $110.27  (+11.19%)  [Yahoo Finance]  Peso SPY: 0.73%  Peso QQQ: 1.12%\n   \u2192 Nvidia (NVDA): $208.64  (+1.73%)  [Yahoo Finance]  Peso SPY: 7.86%  Peso QQQ: 8.41%\n\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\ud83d\udd34 [ALTA] Nvidia anuncia alianza estrat\u00e9gica con SK Hynix para codesarrollo de memoria de pr\u00f3xima generaci\u00f3n\n   Asia \u00b7 tecnolog\u00eda / semiconductores \u00b7 reuters.com\n\n   Nvidia anunci\u00f3 un acuerdo de codesarrollo de memoria de pr\u00f3xima generaci\u00f3n con SK Hynix, alineado con la hoja de ruta de infraestructura de IA de Nvidia y dise\u00f1ado para mejorar el suministro de memori ance]\n\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\ud83d\udfe1 [MEDIA] Trump exige alto al fuego inmediato en Oriente Medio; se\u00f1ales de distensi\u00f3n apoyan rebote de mercados\n   Global \u00b7 geopol\u00edtica \u00b7 reuters.com\n\n   El presidente Trump exigi\u00f3 un alto al fuego inmediato en Oriente Medio, generando se\u00f1ales de distensi\u00f3n que contribuyeron al rebote del mercado el 8 de junio junto con la recuperaci\u00f3n del sector semiconductores.\n   \u2192 WTI Petr\u00f3leo: $90.58  (+0.04%)  [Yahoo Finance]\n   \u2192 WTI Petr\u00f3leo: $90.58  (+0.04%)  [Yahoo Finance]\n\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\ud83d\udd34 [ALTA] Micron Technology cay\u00f3 13,5% el viernes; rebota con fuerza el lunes\n   EE.UU. \u00b7 tecnolog\u00eda / semiconductores \u00b7 cnbc.com\n\n   Micron Technology, uno de los activos m\u00e1s golpeados el viernes con una ca\u00edda de 13,5% en el derrumbe del sector que borr\u00f3 USD $1 bill\u00f3n en capitalizaci\u00f3n de mercado, lider\u00f3 el rebote del lunes junto con Marvell Technology.\n   \u2192 Micron (MU): $949.28  (+9.87%)  [Yahoo Finance]  Peso SPY: 1.53%  Peso QQQ: 4.90%\n   \u2192 Marvell Technology (MRVL): $288.85  (+9.63%)  [Yahoo Finance]  Peso QQQ: 0.75%\n\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2  y tanqueros con destino a puertos iran\u00edes. La escalada tens\u00f3 las negociaciones de cese al fuego y fue el principal driver de la ca\u00edda burs\u00e1til del d\u00eda y del rally del crudo.\n   \u2192 WTI Petr\u00f3leo: $96.20  (+2.60%)  [Yahoo Finance]\n   \u2192 WTI Crude (CL=F): $96.20  (+2.60%)  [Yahoo Finance]\n   \u2192 Brent Crude ETF (BNO): $53.94  (+1.99%)  [Yahoo Finance]\n   \u2192 Energy Select Sector ETF (XLE): $58.71  (+1.29%)  [Yahoo Finance]\n\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\ud83d\udd34 [ALTA] JPMorgan: Estrecho de Ormuz podr\u00eda reabrir en junio por agotamiento de inventarios globales\n   Global \u00b7 Energ\u00eda / Macro \u00b7 CNBC / JPMorgan Research\n\n   Analistas de JPMorgan se\u00f1alaron en una nota que el ritmo de agotamiento de inventarios de petr\u00f3leo presionar\u00e1 a las partes a reabrir el Estrecho de Ormuz tan pronto como este mes. El estrecho concentra aproximadamente el 20% de las exportaciones globales de crudo y permanece bloqueado desde febrero, siendo uno de los principales factores estructurales detr\u00e1s del rally sostenido del WTI.\n   \u2192 WTI Petr\u00f3leo: $96.20  (+2.60%)  [Yahoo Finance]\n   \u2192 WTI Crude (CL=F): $96.20  (+2.60%)  [Yahoo Finance]\n   \u2192 Energy Select Sector ETF (XLE): $58.71  (+1.29%)  [Yahoo Finance]\n\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\ud83d\udd34 [ALTA] ADP Employment mayo: 122K vs 110K esperado \u2014 dato m\u00e1s fuerte desde enero 2025\n   Global \u00b7 Macro / Empleo \u00b7 CNBC / ADP\n\n   La encuesta privada de ADP mostr\u00f3 que las empresas incorporaron 122.000 trabajadores en mayo, superando el consenso de 110.000 y marcando el registro m\u00e1s s\u00f3lido desde enero de 2025. El resultado refuerza el escenario de mercado laboral resiliente y eleva las expectativas de postura hawkish de la Fed, con la inflaci\u00f3n de abril ya en 3.8% interanual, muy por encima del target del 2%.\n   \u2192 Treasury 10Y: 4.49%  (+4 bps)  [Yahoo Finance]\n   \u2192 Treasury 10Y (^TNX): 4.49%  (+4 bps)  [Yahoo Finance]\n\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\ud83d\udd34 [ALTA] Fed: inflaci\u00f3n en 3.8% y empleo s\u00f3lido reavivan debate sobre suba de tasas en 2026\n   Global \u00b7 Pol\u00edtica Monetaria / Fed \u00b7 Motley Fool / HeyGoTrade / Morningstar\n\n   Con el CPI y PCE de abril ambos en 3.8% interanual y el dato ADP de mayo superando expectativas, el mercado comienza a descontar la posibilidad de que la Fed suba tasas antes de fin de a\u00f1o. El pr\u00f3ximo NFP del viernes 6 de junio ser\u00e1 determinante para las expectativas de cara a la reuni\u00f3n de la Fed del 17 y 18 de junio, y el Beige Book fue publicado tambi\u00e9n hoy.\n   \u2192 Treasury 10Y: 4.49%  (+4 bps)  [Yahoo Finance]\n   \u2192 Treasury 10Y (^TNX): 4.49%  (+4 bps)  [Yahoo Finance]\n   \u2192 Treasury 5Y (^FVX): 4.21%  (+4 bps)  [Yahoo Finance]\n\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u ria / Inflaci\u00f3n \u00b7 Eurostat / Bloomberg\n\n   La inflaci\u00f3n de la eurozona escal\u00f3 al 3.2% interanual en mayo de 2026, su nivel m\u00e1s alto desde septiembre de 2023, impulsada por precios de energ\u00eda que subieron un 10.9% vinculados a tensiones en Medio Oriente. El dato consolida pr\u00e1cticamente como un hecho el alza de 25 puntos b\u00e1sicos en la reuni\u00f3n del BCE del 11 de junio.\n   \u2192 EUR/USD: 1.1601  (-0.30%)  [Yahoo Finance]\n   \u2192 EUR/USD (EURUSD=X): 1.1601  (-0.30%)  [Yahoo Finance]\n\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\ud83d\udd34 [ALTA] EE.UU. propone aranceles de 10\u201312.5% a 60 socios comerciales\n   EE.UU. \u00b7 Comercio / Pol\u00edtica arancelaria \u00b7 Reuters / TheStreet\n\n   La administraci\u00f3n estadounidense propuso aranceles de al menos 10% a importaciones provenientes de 60 socios comerciales, incluyendo Canad\u00e1, M\u00e9xico, la UE, Taiw\u00e1n y el Reino Unido, en el marco de una investigaci\u00f3n sobre bienes producidos con trabajo forzado. Las medidas est\u00e1n sujetas a consulta p\u00fablica y generaron presi\u00f3n bajista sobre sectores c\u00edclicos de amplio mercado.\n   \u2192 S&P 500: $7,553.68  (-0.74%)  [Yahoo Finance]\n   \u2192 S&P 500 (^GSPC): $7,553.68  (-0.74%)  [Yahoo Finance]\n   \u2192 Dow Jones (^DJI): $50,687.07  (-1.21%)  [Yahoo Finance]\n\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2 shm y tanqueros iran\u00edes, reavivando el riesgo de disrupci\u00f3n en el Estrecho de Ormuz.\n\u2022 El WTI cerr\u00f3 en $95.38 (+1.73%) y el Treasury 10Y subi\u00f3 4 bps hasta 4.49%, reflejando el repricing de riesgo geopol\u00edtico y de inflaci\u00f3n.\n\u2022 El sector software enterprise sufri\u00f3 su segunda jornada consecutiva de ca\u00eddas, con ServiceNow y Snowflake cayendo m\u00e1s del 7%, en lo que es digesti\u00f3n de la recuperaci\u00f3n del 21% de mayo en el ETF IGV.\n\u2022 Los semiconductores operaron como refugio relativo dentro del sector tech, con Intel +4.43%, AMD +4.02% y Marvell acumulando m\u00e1s del 50% en cinco d\u00edas.\n\u2022 Broadcom report\u00f3 after-hours un miss estrecho de revenue ($22.187B vs. $22.27B estimado) pero super\u00f3 el EPS ($2.44 vs. $2.40), con semiconductores de IA generando $10.8B.\n\u2022 CrowdStrike super\u00f3 ampliamente las estimaciones de EPS en su reporte Q1 FY2027 ($1.10 vs. $0.88 esperado), aunque los detalles de revenue y guidance no fueron confirmados en fuentes autorizadas.\n\u2022 El VIX subi\u00f3 1.84% hasta 16.06, se\u00f1alando un aumento moderado pero no extremo de la aversi\u00f3n al riesgo en la sesi\u00f3n.\n\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n\ud83d\udcf1 WHATSAPP \u2014 CIERRE (listo para copiar)\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n\n\ud83d\udcc5 Mi\u00e9rcoles 3 de j  / Reuters\n\n   Las tensiones entre Israel e Ir\u00e1n se intensificaron mientras Netanyahu sugiri\u00f3 posibles nuevos ataques y las negociaciones de cese al fuego se complicaron, impulsando al alza el precio del crudo. La preocupaci\u00f3n por una eventual interrupci\u00f3n del suministro a trav\u00e9s del Estrecho de Ormuz presion\u00f3 los rendimientos de los treasuries al alza y provoc\u00f3 ventas en los \u00edndices accionarios estadounidenses.\n   \u2192 WTI Petr\u00f3leo: $95.27  (+1.61%)  [Yahoo Finance]\n   \u2192 WTI +1.61% (WTI): 4.0100  (-0.25%)  [Yahoo Finance]\n   \u2192 Treasury 10Y +4 bps (^TNX): 4.49%  (+4 bps)  [Yahoo Finance]\n\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\ud83d\udd34 [ALTA] Toma de ganancias masiva en software enterprise tras rally de +40% desde m\u00ednimos de abril\n   EE.UU. \u00b7 Renta Variable / Tecnolog\u00eda \u00b7 Reuters / Bloomberg / MarketWatch\n\n   Acciones de software enterprise sufrieron su segunda sesi\u00f3n consecutiva de ca\u00eddas pronunciadas, con nombres como ServiceNow, Snowflake, Palantir, Oracle, SAP y Salesforce cediendo entre 5% y 8%, en una correcci\u00f3n interpretada como toma de ganancias institucional tras un rally de aproximadamente 40-44% desde los m\u00ednimos de abril. El contexto fue el rebote post-SaaSpocalypse de febrero de 2026, cuando el lanzamiento de Claude Cowork de Anthropic elimin\u00f3 cerca de 285 mil millones de d\u00f3lares en valuaciones del sector en 48 horas.\n   \u2192 S&P 500: $7,553.68  (-0.74%)  [Yahoo Finance]\n   \u2192 ServiceNow (NOW): $117.90  (-7.64%)  [Yahoo Finance]  Peso SPY: 0.20%\n   \u2192 Snowflake (SNOW): $241.28  (-7.61%)  [Yahoo Finance]\n   \u2192 Palantir (PLTR): $142.20  (-6.55%)  [Yahoo Finance]  Peso SPY: 0.53%\n   \u2192 Oracle (ORCL): $230.33  (-5.83%)  [Yahoo Finance]  Peso SPY: 0.64%\n   \u2192 SAP (SAP): $180.67  (-5.32%)  [Yahoo Finance]\n   \u2192 Salesforce (CRM): $190.61  (-5.09%)  [Yahoo Finance]  Peso SPY: 0.29%\n\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\ud83d\udfe1 [MEDIA] Rotaci\u00f3n sectorial: semiconductores de memoria y chips espec\u00edficos ganan mientras software cae\n   EE.UU. \u00b7 Renta Variable / Semiconductores \u00b7 Bloomberg / CNBC\n\n   El mercado exhibi\u00f3 una clara rotaci\u00f3n dentro del sector tecnol\u00f3gico, con Intel, AMD, Qualcomm y Lam Research avanzando mientras el software enterprise retroced\u00eda, y Marvell Technology acumulando m\u00e1s de 50% en los \u00faltimos cinco d\u00edas. La excepci\u00f3n fue Nvidia, que cedi\u00f3 terreno como parte de la rotaci\u00f3n desde megacaps hacia chips de memoria y semiconductores espec\u00edficos.\n   \u2192 S&P 500: $7,553.68  (-0.74%)  [Yahoo Finance]\n   \u2192 Intel (INTC): $112.71  (+4.43%)  [Yahoo Finance]  Peso SPY: 0.78%\n   \u2192 AMD (AMD): $542.52  (+4.02%)  [Yahoo Finance]  Peso SPY: 1.30%\n   \u2192 Qualcomm (QCOM): $250.01  (+3.81%)  [Yahoo Finance]  Peso SPY: 0.39%\n   \u2192 Meta (META): $622.98  (+4.24%)  [Yahoo Finance]  Peso SPY: 2.00%\n   \u2192 Lam Research (LRCX): $343.71  (+2.78%)  [Yahoo Finance]  Peso SPY: 0.64%\n   \u2192 Nvidia (NVDA): $214.75  (-3.62%)  [Yahoo Finance]  Peso SPY: 8.29%\n\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\ud83d\udfe1 [MEDIA] Oracle cae ante nerviosismo de valuaci\u00f3n previo a resultados la pr\u00f3xima semana\n   EE.UU. \u00b7 Renta Variable / Enterprise Tech \u00b7 Reuters / MarketWatch\n\n   Oracle retrocedi\u00f3 con fuerza en el contexto de la toma de ganancias sectorial, luego de haber subido cerca de 8% la semana previa tras el rally de Snowflake, generando preocupaciones sobre su valuaci\u00f3n antes de reportar resultados la semana entrante. Los inversores aguardan se\u00f1ales sobre el balance entre gasto en inteligencia artificial e ingresos generados, lo que convierte al pr\u00f3ximo reporte en un evento de alta relevancia para el sector.\n   \u2192 S&P 500: $7,553.68  (-0.74%)  [Yahoo Finance]\n   \u2192 Oracle (ORCL): $230.33  (-5.83%)  [Yahoo Finance]  Peso SPY: 0.64%\n\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\ud83d\udfe1 [MEDIA] Nu Holdings baja tras nuevo downgrade analista; bancos brasile\u00f1os acompa\u00f1an la ca\u00edda\n   Latam \u00b7 Renta Variable / Financiero \u00b7 Bloomberg L\u00ednea / Reuters\n\n   Nu Holdings recibi\u00f3 una nueva rebaja de calificaci\u00f3n de un analista que cit\u00f3 presi\u00f3n en m\u00e1rgenes e incertidumbre por la transici\u00f3n de liderazgo en la posici\u00f3n de CFO, arrastrando a la acci\u00f3n a la baja. Los pares del sector financiero brasile\u00f1o, Banco Bradesco e Ita\u00fa Unibanco, tambi\u00e9n cerraron en rojo, evidenciando una debilidad generalizada en nombres financieros de la regi\u00f3n.\n   \u2192 S&P 500: $7,553.68  (-0.74%)  [Yahoo Finan 2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\ud83d\udd34 [ALTA] Ir\u00e1n declara fin de operaci\u00f3n militar en Israel tras ataques del fin de semana\n   Global \u00b7 Geopol\u00edtica \u00b7 cnbc.com\n\n   Ir\u00e1n declar\u00f3 haber puesto fin a su operaci\u00f3n militar en Israel tras los ataques del fin de semana, mientras el presidente Trump se\u00f1al\u00f3 optimismo sobre el avance de un acuerdo con Teher\u00e1n. La de-escalada alivi\u00f3 temores de ruptura en las negociaciones en curso.\n   \u2192 WTI Petr\u00f3leo: $89.08  (-2.43%)  [Yahoo Finance]\n   \u2192 Oro (GC=F): $4,366.70  (+0.71%)  [Yahoo Finance]\n   \u2192 S&P 500 (^GSPC): $7,405.73  (+0.30%)  [Yahoo Finance]\n\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\ud83d\udd34 [ALTA] Nvidia anuncia alianza con SK Hynix para co-desarrollo de memoria de pr\u00f3xima generaci\u00f3n\n   EE.UU. \u00b7 Tecnolog\u00eda / Semiconductores \u00b7 cnbc.com\n\n   Nvidia anunci\u00f3 una colaboraci\u00f3n con SK Hynix orientada al co-desarrollo de memoria avanzada para la hoja de ruta de infraestructura de IA de Nvidia, buscando tambi\u00e9n mejorar el suministro de memoria de pr\u00f3xima generaci\u00f3n. El acuerdo impuls\u00f3 a fabricantes de chips en Tokio y Se\u00fal durante la sesi\u00f3n asi\u00e1tica del martes.\n   \u2192 Nvidia (NVDA): $208.64  (+1.73%)  [Yahoo Finance]  Peso SPY: 7.86%  Peso QQQ: 8.41%\n   \u2192 Nikkei 225 (^N225): $65,416.63  (+2.17%)  [Yahoo Finance]\n\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u25 n Nasdaq (tentativo viernes 12 jun, $135/acci\u00f3n) y resultados de Oracle (mi\u00e9rcoles) son los catalizadores corporativos de corto plazo a vigilar.\n\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501"};

var AP={"20260605": "\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\nAPERTURA \u2014 VIERNES 5 DE JUNIO DE 2026\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n\nMERCADOS ABIERTOS (9:00 AM Chile)\n- Nikkei 225             67,470.69      (-1.36%)\n- EuroStoxx 50           6,062.07       (-0.68%)\n- Fut. S&P 500           $7,490.50      (-1.45%)\n- Fut. Nasdaq            29,643.75      (-2.77%)\n\nTREASURY Y DIVISAS\n- Treasury 10Y           4.54%          (+6 bps)\n- EUR/USD                1.1537         (-0.63%)\n- USD/JPY                160.27         (+0.21%)\n- GBP/USD                1.3361         (-0.50%)\n- USD/CLP                915.15         (+2.26%)\n- WTI Petr\u00f3leo           $90.61         (-2.61%)\n- Oro                    $4363.4        (-2.51%)\n\nFuente: Yahoo Finance\n\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\ud83d\udd34 [ALTA] N\u00f3minas de mayo (NFP) superan ampliamente expectativas: +172.000 empleos vs. consenso de 85.000\n   EE.UU. \u00b7 Datos Macro \u00b7 cnbc.com\n\n   El Departamento de Trabajo public\u00f3 hoy que el empleo no agr\u00edcola de mayo creci\u00f3 172.000 puestos, aproximadamente el doble del consenso de 85.000, mientras el desempleo se mantuvo en 4.3%. El dato reaviv\u00f3 temores de que la Fed deba frenar una econom\u00eda sobrecalentada, con los mercados descartando recortes de tasas en 2026.\n   URL: https://www.cnbc.com/2026/06/06/jobs-report-may-2026.html\n   \u2192 Treasury 10Y: 4.54%  (+6 bps)  [Yahoo Finance]\n\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\ud83d\udd34 [ALTA] Treasury 10Y salta a 4.54% tras dato de empleo de mayo\n   EE.UU. \u00b7 Renta Fija \u00b7 marketwatch.com\n\n   El rendimiento del bono del Tesoro estadounidense a 10 a\u00f1os subi\u00f3 6 puntos b\u00e1sicos hasta 4.54% luego de la publicaci\u00f3n del NFP de mayo, reflejando el reajuste de expectativas sobre la pol\u00edtica monetaria de la Fed. Los futuros de tasas ya no descuentan recortes para 2026.\n   URL: https://www.marketwatch.com/story/treasury-yields-10-year-nfp-may-2026\n   \u2192 Treasury 10Y: 4.54%  (+6 bps)  [Yahoo Finance]\n\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\ud83d\udd34 [ALTA] Broadcom (AVGO) ampl\u00eda ca\u00eddas en apertura tras miss de revenue en Q2 fiscal\n   EE.UU. \u00b7 Tecnolog\u00eda / Semiconductores \u00b7 cnbc.com\n\n   Broadcom report\u00f3 ingresos del segundo trimestre fiscal de 22.190 millones de d\u00f3lares, por debajo de los 22.270 millones estimados por analistas de LSEG, sin mejora en su perspectiva de chips de IA. La acci\u00f3n ca\u00eda cerca de un 5% adicional en la apertura del viernes, tras haberse desplomado m\u00e1s del 12% el jueves.\n   URL: https://www.cnbc.com/2026/06/06/broadcom-avgo-earnings-q2-fiscal-2026.html\n\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\ud83d\udfe1 [MEDIA] Lululemon (LULU) cae ~10% tras recortar guidance anual de ingresos y ganancias\n   EE.UU. \u00b7 Consumo Discrecional \u00b7 marketwatch.com\n\n   Lululemon Athletica redujo su guidance de ingresos y ganancias para todo el a\u00f1o fiscal, citando obst\u00e1culos macroecon\u00f3micos, a pesar de haber superado ligeramente las estimaciones de FactSet en el trimestre reportado. Las acciones se desplomaron cerca de un 10% en la apertura del viernes.\n   URL: https://www.marketwatch.com/story/lululemon-lulu-earnings-guidance-cut-2026\n\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\ud83d\udd34 [ALTA] Nikkei 225 cae ~1.36% por segundo d\u00eda consecutivo, presionado por tecnol\u00f3gicas y salarios reales en Jap\u00f3n\n   Asia \u00b7 Renta Variable / Asia \u00b7 nikkei.com\n\n   El Nikkei 225 extendi\u00f3 p\u00e9rdidas por segundo d\u00eda consecutivo, con las acciones tecnol\u00f3gicas y de IA bajo presi\u00f3n de ventas tras la decepcionante perspectiva de Broadcom. Los datos de salarios reales en Jap\u00f3n mostraron un alza p Nikkei 225 (^N225): $65,416.63  (+2.17%)  [Yahoo Finance]\n\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\ud83d\udd34 [ALTA] Corning sube tras anunciar contrato multimillonario de fibra \u00f3ptica con Amazon\n   EE.UU. \u00b7 Tecnolog\u00eda / Infraestructura IA \u00b7 cnbc.com\n\n   Corning anunci\u00f3 un acuerdo multimillonario de fibra \u00f3ptica destinado a potenciar los centros de datos de IA de Amazon en EE.UU., lo que gener\u00f3 una fuerte reacci\u00f3n positiva en sus acciones el lunes. El contrato refuerza el ciclo de inversi\u00f3n en infraestructura de inteligencia artificial.\n   \u2192 Corning (GLW): $187.54  (+5.61%)  [Yahoo Finance]  Peso SPY: 0.22%\n   \u2192 Amazon (AMZN): $245.22  (-0.33%)  [Yahoo Finance]  Peso SPY: 3.79%  Peso QQQ: 4.31%\n\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\ud83d\udd34 [ALTA] N\u00f3minas de mayo EE.UU. en 172,000 duplican el consenso y elevan probabilidad de alza Fed al 72%\n   EE.UU. \u00b7 Macro / Pol\u00edtica Monetaria \u00b7 cnbc.com\n\n   El dato de n\u00f3minas no agr\u00edcolas de mayo de 172,000 \u2014pr\u00e1cticamente el doble del consenso de ~85,000\u2014 dispar\u00f3 los rendimientos del Tesoro el viernes pasado y elev\u00f3 al 72% la probabilidad de al menos una subida de tasas en 2026 seg\u00fan la herramienta CME FedWatch. El S&P 500 cay\u00f3 m\u00e1s de 2.6% ese d\u00eda, rompiendo una racha ganadora de nueve semanas.\n   \u2192 Treasury 10Y: 4.55%  (-1 bps)  [Yahoo Finance]\n   \u2192 S&P 500 (^GSPC): $7,405.73  (+0.30%)  [Yahoo Finance]\n   \u2192 D\u00f3lar Index (DX-Y.NYB): $99.70  (-0.35%)  [Yahoo Finance]\n\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\ud83d\udfe1 [MEDIA] Marvell Technology ser\u00e1 incorporado al S&P 500 el 22 de junio\n   EE.UU. \u00b7 \u00cdndices / Semiconductores \u00b7 cnbc.com\n\n   Marvell Technology fue anunciada como nuevo componente del S&P 500 con fecha de incorporaci\u00f3n efectiva el 22 de junio, lo que generar\u00e1 flujos de rebalanceo por parte de fondos indexados. La compa\u00f1\u00eda se beneficia adicionalmente del ciclo de inversi\u00f3n en infraestructura de IA.\n   \u2192 Marvell Technology (MRVL): $288.85  (+9.63%)  [Yahoo Finance]  Peso QQQ: 0.75%\n\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\ud83d\udd34 [ALTA] WTI retrocede ante distensi\u00f3n en Oriente Medio y se\u00f1ales de acuerdo con Ir\u00e1n\n   Global \u00b7 Energ\u00eda / Commodities \u00b7 cnbc.com\n\n   El petr\u00f3leo WTI cae esta ma\u00f1ana impulsado por la de-escalada entre Ir\u00e1n e Israel y el optimismo expresado por Trump sobre un posible acuerdo con Teher\u00e1n, que reducir\u00eda la prima de riesgo geopol\u00edtico incorporada al crudo. Para Europa, el retroceso del petr\u00f3leo representa un alivio sobre las expectativas de inf a distensi\u00f3n geopol\u00edtica, el metal precioso sigue avanzando, se\u00f1alando que la demanda de activos refugio persiste \u2014 probablemente anclada en la incertidumbre sobre el camino de tasas de la Fed y la magnitud del dato de n\u00f3minas del viernes pasado; IPO de SpaceX en Nasdaq (tentativo viernes 12 jun, $135/acci\u00f3n) y resultados de Oracle (mi\u00e9rcoles) son los catalizadores corporativos de corto plazo a vigilar.\n\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501"};
var NL=String.fromCharCode(10);
var MN=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
var DE=["Lunes","Martes","Mi\u00e9rcoles","Jueves","Viernes","S\u00e1bado","Domingo"];
var cur=null,tab="cierre",raw="";
function pad(n){return n<10?"0"+n:""+n;}
function toggleCal(){
  var cw=document.querySelector(".cal-wrap");
  cw.classList.toggle("open");
}
function closeDropdown(){
  var d=document.getElementById("cal-dropdown");
  if(d)d.style.display="none";
}
document.addEventListener("click",function(e){
  if(!e.target.closest(".cal-nav"))closeDropdown();
});
function openDropdown(type){
  var dd=document.getElementById("cal-dropdown");
  dd.innerHTML="";
  if(type==="yr"){
    var years={};
    allMonthKeys.forEach(function(m){years[m.slice(0,4)]=true;});
    Object.keys(years).sort().reverse().forEach(function(yr){
      var item=document.createElement("div");
      item.className="cal-dropdown-item"+(allMonthKeys[curMonthIdx].slice(0,4)===yr?" active":"");
      item.textContent=yr;
      item.onclick=function(){
        var curMon=allMonthKeys[curMonthIdx].slice(4,6);
        var target=yr+curMon;
        var idx=allMonthKeys.indexOf(target);
        if(idx===-1){var best=-1;allMonthKeys.forEach(function(m,i){if(m.slice(0,4)===yr)best=i;});idx=best;}
        if(idx!==-1){curMonthIdx=idx;renderMonth(allMonthKeys[idx]);}
        closeDropdown();
      };
      dd.appendChild(item);
    });
  } else {
    var months={};
    allMonthKeys.forEach(function(m){months[m.slice(4,6)]=true;});
    Object.keys(months).sort().forEach(function(mo){
      var item=document.createElement("div");
      item.className="cal-dropdown-item"+(allMonthKeys[curMonthIdx].slice(4,6)===mo?" active":"");
      item.textContent=MN[parseInt(mo)-1];
      item.onclick=function(){
        var curYr=allMonthKeys[curMonthIdx].slice(0,4);
        var target=curYr+mo;
        var idx=allMonthKeys.indexOf(target);
        if(idx===-1){var best=-1;allMonthKeys.forEach(function(m,i){if(m.slice(4,6)===mo)best=i;});idx=best;}
        if(idx!==-1){curMonthIdx=idx;renderMonth(allMonthKeys[idx]);}
        closeDropdown();
      };
      dd.appendChild(item);
    });
  }
  dd.style.display=dd.innerHTML?"block":"none";
}
var allMonths={};
var allMonthKeys=[];
var curMonthIdx=0;
var curMonth=null;

function buildCal(){
  for(var i=0;i<A.length;i++){var m=A[i].slice(0,6);if(!allMonths[m])allMonths[m]=[];allMonths[m].push(A[i]);}
  allMonthKeys=Object.keys(allMonths).sort().reverse();
  if(allMonthKeys.length>0){curMonthIdx=0;renderMonth(allMonthKeys[0]);}
}

function navMonth(dir){
  var idx=curMonthIdx+dir;
  if(idx<0||idx>=allMonthKeys.length)return;
  curMonthIdx=idx;
  renderMonth(allMonthKeys[idx]);
}

function renderMonth(month){
  curMonth=month;
  var year=parseInt(month.slice(0,4)),mon=parseInt(month.slice(4,6))-1;
  document.getElementById("cal-mon-btn").textContent=MN[mon];
  document.getElementById("cal-yr-btn").textContent=year;
  // Disable/enable nav buttons
  var btnPrev=document.querySelector(".cal-btn:first-child");
  var btnNext=document.querySelector(".cal-btn:last-child");
  if(btnPrev)btnPrev.style.opacity=curMonthIdx>=allMonthKeys.length-1?"0.3":"1";
  if(btnNext)btnNext.style.opacity=curMonthIdx<=0?"0.3":"1";
  var cal=document.getElementById("cal-grid");
  cal.innerHTML="";
  var dim=new Date(year,mon+1,0).getDate(),fd=(new Date(year,mon,1).getDay()+6)%7;
  var hdr=document.createElement("div");hdr.className="cal-hdr";
  ["L","M","X","J","V","S","D"].forEach(function(d){var s=document.createElement("span");s.textContent=d;hdr.appendChild(s);});
  cal.appendChild(hdr);
  var grid=document.createElement("div");grid.className="cal-days";
  for(var e=0;e<fd;e++){var ee=document.createElement("div");ee.className="day";grid.appendChild(ee);}
  for(var d=1;d<=dim;d++){
    var key=year+pad(mon+1)+pad(d);
    var cell=document.createElement("div");
    var hd=allMonths[month]&&allMonths[month].indexOf(key)!==-1;
    cell.className="day"+(hd?" has":"");
    cell.textContent=d;cell.id="dy-"+key;
    if(hd)(function(k){cell.onclick=function(){loadDay(k);};})(key);
    if(cur===key)cell.classList.add("active");
    grid.appendChild(cell);
  }
  cal.appendChild(grid);
}
function loadDay(key){
  if(cur){var p=document.getElementById("dy-"+cur);if(p)p.classList.remove("active");}
  cur=key;
  var keyMonth=key.slice(0,6);
  if(keyMonth!==curMonth){
    var idx=allMonthKeys.indexOf(keyMonth);
    if(idx!==-1){curMonthIdx=idx;renderMonth(keyMonth);}
  }
  var c=document.getElementById("dy-"+key);if(c)c.classList.add("active");
  raw=S[key]||"";
  var y=key.slice(0,4),m=key.slice(4,6),d=key.slice(6,8);
  var dt=new Date(parseInt(y),parseInt(m)-1,parseInt(d));
  var ds=DE[(dt.getDay()+6)%7]+" "+parseInt(d)+" de "+MN[parseInt(m)-1]+" de "+y;
  document.getElementById("topbar").style.display="block";
  document.getElementById("tabs-bar").style.display="flex";
  document.getElementById("topdate").textContent=ds;
  document.getElementById("empty-st").style.display="none";
  // Detect if day has cierre or only apertura
  var hasCierre=raw.indexOf("CIERRE")!==-1||raw.indexOf("\u00cdNDICES EE.UU.")!==-1;
  var hasApertura=(AP&&AP[key])||raw.indexOf("APERTURA")!==-1;
  var tabCierre=document.getElementById("tab-cierre");
  var tabAp=document.getElementById("tab-apertura");
  if(tabCierre){
    if(hasCierre){
      tabCierre.style.opacity="1";
      tabCierre.style.pointerEvents="auto";
      tabCierre.title="";
    } else {
      tabCierre.style.opacity="0.35";
      tabCierre.style.pointerEvents="none";
      tabCierre.title="Cierre aún no disponible";
    }
  }
  // Auto-select best tab
  var bestTab=hasCierre?"cierre":hasApertura?"apertura":"texto";
  sw(bestTab);
}
function sw(t){
  tab=t;
  ["apertura","cierre","texto"].forEach(function(x){
    var el=document.getElementById("view-"+x);if(el)el.className="view"+(x===t?" active":"");
    var tb=document.getElementById("tab-"+x);if(tb)tb.className="tab"+(x===t?" active":"");
  });
  if(t==="texto"){document.getElementById("view-texto").innerHTML="<pre>"+esc(raw)+"</pre>";return;}
  if(t==="apertura"){
    // Use dedicated apertura file if available, else parse from cierre
    var apRaw=AP&&AP[cur]?AP[cur]:null;
    renderApertura(apRaw);
  } else renderCierre();
}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function cc(c){return(!c||c==="-")?"neu":c[0]==="+"?"up":"dn";}
function parseRaw(txt){
  var savedRaw=raw; raw=txt;
  var result=parseAll();
  raw=savedRaw;
  return result;
}
function parseAll(){
  var lines=raw.split(NL),prices={},events=[],narr=[],cm=[],upcoming=[],section="";
  for(var i=0;i<lines.length;i++){
    var line=lines[i],lt=line.trim();
    if(lt.indexOf("EARNINGS DEL D")!==-1)section="et";
    else if(lt.indexOf("EARNINGS ESTA")!==-1||lt.indexOf("EARNINGS HOY")!==-1)section="eu";
    else if(lt.indexOf("MERCADO DE CAP")!==-1)section="cm";
    else if(lt.indexOf("PR\u00d3XIMOS DATOS")!==-1||lt.indexOf("PROXIMOS DATOS")!==-1)section="ud";
    else if(lt.indexOf("NARRATIVA")!==-1||lt.indexOf("PUNTOS CLAVE")!==-1)section="narr";
    else if(lt.match(/^[\u2501\u2500]{10,}/))section="";
    var pm=line.match(/^-\s+(.+?)\s{2,}(\$?[\d,\.]+%?)\s{2,}\(([^)]+)\)/);
    if(pm)prices[pm[1].trim()]={val:pm[2],chg:pm[3]};
    var cp=line.codePointAt(0);
    var isR=(cp===128308)||lt.indexOf("[ROJO]")===0;
    var isA=(cp===128993)||lt.indexOf("[AMARILLO]")===0;
    var isB=(cp===128309)||lt.indexOf("[AZUL]")===0;
    if((isR||isA||isB)&&section!=="et"&&section!=="narr"){
      var imp=isR?"alta":isB?"baja":"media";
      var ttl=Array.from(line).slice(1).join("").trim();
      ttl=ttl.replace(/^\[ROJO\]\s*/,"").replace(/^\[AMARILLO\]\s*/,"").replace(/^\[AZUL\]\s*/,"");
      ttl=ttl.replace(/^\[ALTA\]\s*/,"").replace(/^\[MEDIA\]\s*/,"").replace(/^\[BAJA\]\s*/,"").trim();
      var body="",asset=null,src="",reg="";
      for(var j=i+1;j<Math.min(i+12,lines.length);j++){
        var jl=lines[j].trim();
        if(!jl)continue;
        if(jl.match(/^[\u2501\u2500]{5,}/))break;
        if(jl.indexOf("\u00b7")!==-1&&!jl.match(/^[-\u2192]/)&&jl.codePointAt(0)<128000){
          var pts=jl.split("\u00b7").map(function(s){return s.trim();});
          if(pts.length>=2){reg=pts[0];src=pts[pts.length-1];}
          continue;
        }
        if(jl.indexOf("\u2192")===0||jl.indexOf("->")===0){
          var am=jl.match(/[\u2192>-]+\s*([^:]+):\s*(\$?[\d,\.]+%?)\s*\(([^)]+)\)/);
          if(am){
            var weights=[];
            var wm=jl.match(/Peso (\w+): ([\d\.]+%)/g);
            if(wm)wm.forEach(function(w){weights.push(w);});
            asset={name:am[1].trim(),val:am[2],chg:am[3],weights:weights};
            break;
          }
        }
        if(!body&&jl.codePointAt(0)<128000&&!jl.match(/^[\[-]/)){body=jl;}
      }
      events.push({imp:imp,ttl:ttl,body:body,reg:reg,src:src,asset:asset});
    }
    if(section==="narr"&&(lt.indexOf("- ")===0||lt.indexOf("* ")===0))narr.push(lt.slice(2));
    if(section==="cm"&&lt.match(/^\[/)){var ct=lt.match(/^\[([^\]]+)\]/);cm.push({type:ct?ct[1]:"",text:lt.replace(/^\[[^\]]+\]\s*/,"")});}
    // Upcoming data: "- date   country   indicator | Consenso: x"
    if(section==="ud"&&lt.indexOf("- ")===0){
      var parts=lt.slice(2).split("|").map(function(s){return s.trim();});
      var meta=parts[0].trim().split(/\s{2,}/);
      var ud_date=meta[0]||"",ud_country=meta[1]||"",ud_ind=meta.slice(2).join(" ")||"";
      var ud_con="",ud_nt="";
      for(var pi=1;pi<parts.length;pi++){
        if(parts[pi].indexOf("Consenso:")===0)ud_con=parts[pi].replace("Consenso:","").trim();
        else ud_nt=parts[pi];
      }
      upcoming.push({date:ud_date,country:ud_country,indicator:ud_ind,consensus:ud_con,notes:ud_nt});
    }
  }
  return{prices:prices,events:events,narr:narr,cm:cm,upcoming:upcoming};
}
function sec(t){return '<div class="sec"><div class="sec-bar"></div><span class="sec-title">'+t+'</span><div class="sec-line"></div></div>';}
function cards(items,g){
  var h='<div class="cg '+g+'" style="margin-bottom:1.1rem">';
  items.forEach(function(it){
    if(!it.val)return;
    var cls=cc(it.chg);
    h+='<div class="pc"><div class="pc-lbl">'+it.l+'</div><div class="pc-val">'+it.val+'</div><div class="pc-chg '+cls+'">'+it.chg+'</div></div>';
  });
  return h+'</div>';
}
function hlsHTML(evs){
  var h="";
  evs.forEach(function(ev){

function narrHTML(narr,isAp){
  if(!narr.length)return"";
  var h='<div class="narr">';
  var dc=isAp?'nd-ap':'nd';
  var bc=isAp?'&#8594;':'&#9658;';
  narr.forEach(function(pt){h+='<div class="ni"><span class="'+dc+'">'+bc+'</span><span class="nt">'+esc(pt)+'</span></div>';});
  return h+'</div>';
}
function pget(p,keys){for(var i=0;i<keys.length;i++)if(p[keys[i]])return p[keys[i]];return null;}
function pv(p,keys){var r=pget(p,typeof keys==="string"?[keys]:keys);return r||{val:null,chg:"-"};}
function getGrp(ev){
  var t=(ev.ttl||"").toLowerCase();
  // Equity first - company names/tickers override everything
  if(/resultados|ingresos|ganancias|earnings|nvidia|apple|microsoft|intel|amazon|meta|tesla|broadcom|google|alphabet|samsung|amd|qualcomm|micron|tsmc|asml|ipo|emisi.n|adquisici.n|trimestre|guidance|perspectivas/.test(t))return "Equity";
  if(/desempleo|inflaci.n|pib|pmi|fed |banco central|productividad|solicitudes|ventas minoristas|n.minas|empleo|tasa de inter|cpi|pce|nfp/.test(t))return "Datos econ\u00f3micos";
  if(/bono|treasury|yield|renta fija/.test(t))return "Renta fija";
  if(/guerra|ir.n|israel|c.mara|legisla|ceasefire|militar|negociaci.n|geopolit|aranceles|sanci.n/.test(t))return "Geopolítica y global";
  return "Equity";
}
